  rxdart: any
  equatable: ^2.0.7
  collection: any
  meta: any
  uuid: any
  intl: any
  flutter_keyboard_visibility: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
