name: duskmoon_ui
description: DuskMoon UI — umbrella package re-exporting all DuskMoon Flutter packages
version: 1.2.2
homepage: https://github.com/duskmoon-dev/flutter_duskmoon_ui
repository: https://github.com/duskmoon-dev/flutter_duskmoon_ui
issue_tracker: https://github.com/duskmoon-dev/flutter_duskmoon_ui/issues
topics:
  - flutter
  - design-system
  - ui
  - widgets
  - theme

resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  duskmoon_theme: ^1.2.2
  duskmoon_theme_bloc: ^1.2.2
  duskmoon_widgets: ^1.2.2
  duskmoon_settings: ^1.2.2
  duskmoon_feedback: ^1.2.2
  duskmoon_visualization: ^1.2.2
  duskmoon_form: ^1.2.2
  duskmoon_code_engine: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
