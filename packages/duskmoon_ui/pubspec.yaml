name: duskmoon_ui
description: DuskMoon UI — umbrella package re-exporting all DuskMoon Flutter packages
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  duskmoon_theme:
    path: ../duskmoon_theme
  duskmoon_widgets:
    path: ../duskmoon_widgets
  duskmoon_settings:
    path: ../duskmoon_settings
  duskmoon_feedback:
    path: ../duskmoon_feedback

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
