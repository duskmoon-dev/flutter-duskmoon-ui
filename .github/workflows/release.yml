name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      git_ref:
        description: "Git ref to release from"
        required: true
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Update package versions
        run: |
          VERSION="${{ inputs.version }}"
          for pubspec in packages/*/pubspec.yaml; do
            sed -i "s/^version: .*/version: $VERSION/" "$pubspec"
            echo "Updated $pubspec to $VERSION"
          done

      - name: Prepare packages for publishing
        run: |
          VERSION="${{ inputs.version }}"

          # Remove publish_to: none from all packages
          for pubspec in packages/*/pubspec.yaml; do
            sed -i '/^publish_to: none$/d' "$pubspec"
          done

          # Re-add publish_to: none for duskmoon_theme_bloc (intentionally not published)
          sed -i '/^version: .*/a publish_to: none' packages/duskmoon_theme_bloc/pubspec.yaml

          # Replace path dependencies with hosted version constraints
          # Packages that depend on duskmoon_theme
          for pubspec in packages/duskmoon_widgets/pubspec.yaml packages/duskmoon_settings/pubspec.yaml packages/duskmoon_feedback/pubspec.yaml packages/duskmoon_theme_bloc/pubspec.yaml; do
            sed -i '/^  duskmoon_theme:$/,/^    path: .*$/c\  duskmoon_theme: ^'"$VERSION" "$pubspec"
          done

          # duskmoon_ui depends on theme, widgets, settings, feedback
          sed -i '/^  duskmoon_theme:$/,/^    path: .*$/c\  duskmoon_theme: ^'"$VERSION" packages/duskmoon_ui/pubspec.yaml
          sed -i '/^  duskmoon_widgets:$/,/^    path: .*$/c\  duskmoon_widgets: ^'"$VERSION" packages/duskmoon_ui/pubspec.yaml
          sed -i '/^  duskmoon_settings:$/,/^    path: .*$/c\  duskmoon_settings: ^'"$VERSION" packages/duskmoon_ui/pubspec.yaml
          sed -i '/^  duskmoon_feedback:$/,/^    path: .*$/c\  duskmoon_feedback: ^'"$VERSION" packages/duskmoon_ui/pubspec.yaml

      - name: Re-resolve dependencies
        run: dart pub get

      - name: Analyze
        run: |
          for pkg in packages/duskmoon_theme packages/duskmoon_theme_bloc packages/duskmoon_widgets packages/duskmoon_settings packages/duskmoon_feedback packages/duskmoon_ui; do
            echo "::group::Analyzing $pkg"
            (cd $pkg && dart analyze --fatal-infos)
            echo "::endgroup::"
          done

      - name: Test
        run: |
          for pkg in packages/duskmoon_theme packages/duskmoon_theme_bloc packages/duskmoon_widgets packages/duskmoon_settings packages/duskmoon_feedback packages/duskmoon_ui; do
            if [ -d "$pkg/test" ] && [ "$(ls -A $pkg/test)" ]; then
              echo "::group::Testing $pkg"
              (cd $pkg && flutter test)
              echo "::endgroup::"
            fi
          done

      - name: Setup pub.dev credentials
        run: |
          mkdir -p "$HOME/.config/dart"
          echo '${{ secrets.PUB_CREDENTIALS }}' > "$HOME/.config/dart/pub-credentials.json"

      - name: Publish to pub.dev
        run: |
          # Publish order respects dependency graph:
          # 1. duskmoon_theme (no deps)
          # 2. duskmoon_widgets, duskmoon_settings, duskmoon_feedback (depend on theme)
          # 3. duskmoon_ui (depends on all above)
          # Note: duskmoon_theme_bloc is publish_to: none — skipped

          PUBLISH_ORDER=(
            packages/duskmoon_theme
            packages/duskmoon_widgets
            packages/duskmoon_settings
            packages/duskmoon_feedback
            packages/duskmoon_ui
          )

          for pkg in "${PUBLISH_ORDER[@]}"; do
            echo "::group::Publishing $pkg"
            (cd "$pkg" && dart pub publish --force)
            echo "::endgroup::"
          done

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add packages/*/pubspec.yaml
          git commit -m "chore(release): v${{ inputs.version }}"

      - name: Create tag
        run: git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ inputs.git_ref }}
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --target "${{ inputs.git_ref }}"
