name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      git_ref:
        description: "Git ref to release from"
        required: true
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Prepare Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Update package versions and prepare for publishing
        run: |
          VERSION="${{ inputs.version }}"

          # Update version in all packages
          for pubspec in packages/*/pubspec.yaml; do
            sed -i "s/^version: .*/version: $VERSION/" "$pubspec"
            echo "Updated $pubspec to $VERSION"
          done

          # Remove publish_to: none from all packages
          for pubspec in packages/*/pubspec.yaml; do
            sed -i '/^publish_to: none$/d' "$pubspec"
          done

          # Replace internal dependencies with hosted version constraints
          # Handles both path format and existing hosted format:
          #   duskmoon_theme:        OR   duskmoon_theme: ^x.y.z
          #     path: ../...
          for pubspec in packages/duskmoon_widgets/pubspec.yaml packages/duskmoon_settings/pubspec.yaml packages/duskmoon_feedback/pubspec.yaml packages/duskmoon_theme_bloc/pubspec.yaml; do
            # Handle path dep format (two lines)
            sed -i '/^  duskmoon_theme:$/,/^    path: .*$/c\  duskmoon_theme: ^'"$VERSION" "$pubspec"
            # Handle hosted dep format (single line)
            sed -i 's/^  duskmoon_theme: \^.*$/  duskmoon_theme: ^'"$VERSION"'/' "$pubspec"
          done

          for dep in duskmoon_theme duskmoon_widgets duskmoon_settings duskmoon_feedback; do
            # Handle path dep format
            sed -i '/^  '"$dep"':$/,/^    path: .*$/c\  '"$dep"': ^'"$VERSION" packages/duskmoon_ui/pubspec.yaml
            # Handle hosted dep format
            sed -i 's/^  '"$dep"': \^.*$/  '"$dep"': ^'"$VERSION"'/' packages/duskmoon_ui/pubspec.yaml
          done

      - name: Re-resolve dependencies
        run: dart pub get

      - name: Analyze
        run: |
          for pkg in packages/duskmoon_theme packages/duskmoon_theme_bloc packages/duskmoon_widgets packages/duskmoon_settings packages/duskmoon_feedback packages/duskmoon_ui; do
            echo "::group::Analyzing $pkg"
            (cd $pkg && dart analyze --fatal-infos)
            echo "::endgroup::"
          done

      - name: Test
        run: |
          for pkg in packages/duskmoon_theme packages/duskmoon_theme_bloc packages/duskmoon_widgets packages/duskmoon_settings packages/duskmoon_feedback packages/duskmoon_ui; do
            if [ -d "$pkg/test" ] && [ "$(ls -A $pkg/test)" ]; then
              echo "::group::Testing $pkg"
              (cd $pkg && flutter test)
              echo "::endgroup::"
            fi
          done

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump and create tag
        run: |
          git add packages/*/pubspec.yaml
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore(release): v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:${{ inputs.git_ref }}
          git push origin "v${{ inputs.version }}"

      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml --ref "v${{ inputs.version }}" -f tag="v${{ inputs.version }}"
