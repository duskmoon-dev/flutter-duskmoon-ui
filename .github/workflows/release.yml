name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      git_ref:
        description: "Git ref to release from"
        required: true
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Prepare Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Update package versions and prepare for publishing
        run: |
          VERSION="${{ inputs.version }}"

          # duskmoon_adaptive_scaffold is independently versioned — skip it.
          SKIP="packages/duskmoon_adaptive_scaffold/pubspec.yaml"

          # Update version in all packages except duskmoon_adaptive_scaffold
          for pubspec in packages/*/pubspec.yaml; do
            [ "$pubspec" = "$SKIP" ] && continue
            sed -i "s/^version: .*/version: $VERSION/" "$pubspec"
            echo "Updated $pubspec to $VERSION"
          done

          # Remove publish_to: none from all packages except duskmoon_adaptive_scaffold
          for pubspec in packages/*/pubspec.yaml; do
            [ "$pubspec" = "$SKIP" ] && continue
            sed -i '/^publish_to: none$/d' "$pubspec"
          done

          # Replace internal duskmoon_* dependencies with hosted version constraints
          # across every package pubspec (except duskmoon_adaptive_scaffold itself).
          # Handles both formats:
          #   duskmoon_foo: ^x.y.z   (hosted, single line)
          #   duskmoon_foo:          (path dep, two lines)
          #     path: ../duskmoon_foo
          # duskmoon_adaptive_scaffold keeps its own version constraint unchanged.
          for pubspec in packages/*/pubspec.yaml; do
            [ "$pubspec" = "$SKIP" ] && continue
            # Convert path-dep blocks (two lines) to hosted constraint first,
            # but NOT for duskmoon_adaptive_scaffold (it has its own versioning).
            perl -i -0pe 's/^  (duskmoon_(?!adaptive_scaffold)\w+):\n    path: [^\n]+/  $1: ^'"$VERSION"'/mg' "$pubspec"
            # Update versioned constraints for all duskmoon_* except duskmoon_adaptive_scaffold
            sed -i 's/^  \(duskmoon_[a-z_]*\): \^.*$/  \1: ^'"$VERSION"'/' "$pubspec"
            # Restore duskmoon_adaptive_scaffold to its own version
            SCAFFOLD_VER=$(grep '^version:' packages/duskmoon_adaptive_scaffold/pubspec.yaml | awk '{print $2}')
            sed -i "s/^  duskmoon_adaptive_scaffold: \^.*$/  duskmoon_adaptive_scaffold: ^$SCAFFOLD_VER/" "$pubspec"
          done

      - name: Re-resolve dependencies
        run: dart pub get

      - name: Analyze
        run: |
          for pkg in packages/*/; do
            [ -f "$pkg/pubspec.yaml" ] || continue
            echo "::group::Analyzing $pkg"
            (cd "$pkg" && dart analyze --fatal-infos)
            echo "::endgroup::"
          done

      - name: Test
        run: |
          for pkg in packages/*/; do
            [ -f "$pkg/pubspec.yaml" ] || continue
            if [ -d "$pkg/test" ] && [ "$(ls -A "$pkg/test")" ]; then
              echo "::group::Testing $pkg"
              (cd "$pkg" && flutter test)
              echo "::endgroup::"
            fi
          done

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump and create tag
        run: |
          git add packages/*/pubspec.yaml
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore(release): v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:${{ inputs.git_ref }}
          git push origin "v${{ inputs.version }}"

      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml --ref "v${{ inputs.version }}" -f tag="v${{ inputs.version }}"
