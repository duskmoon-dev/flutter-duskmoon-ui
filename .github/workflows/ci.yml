name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: dart pub get
      - name: Check formatting
        run: dart format --set-exit-if-changed packages/ example/design_preview/ example/duo_screen/

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: dart pub get
      - name: Analyze all packages
        run: |
          for pkg in packages/duskmoon_theme packages/duskmoon_theme_bloc packages/duskmoon_widgets packages/duskmoon_settings packages/duskmoon_feedback packages/duskmoon_form packages/duskmoon_ui packages/duskmoon_adaptive_scaffold packages/duskmoon_code_engine packages/duskmoon_visualization example/design_preview example/duo_screen; do
            echo "::group::Analyzing $pkg"
            (cd $pkg && dart analyze --fatal-infos)
            echo "::endgroup::"
          done
