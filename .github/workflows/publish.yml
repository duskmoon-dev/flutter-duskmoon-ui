name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.1)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: |
          # Publish order respects dependency graph:
          # 0. duskmoon_adaptive_scaffold, duskmoon_code_engine (independently versioned, no internal deps)
          # 1. duskmoon_theme (no internal deps)
          # 2. duskmoon_theme_bloc, duskmoon_widgets, duskmoon_settings, duskmoon_feedback (depend on theme)
          # 3. duskmoon_form (depends on theme + widgets)
          # 4. duskmoon_ui (depends on all above except theme_bloc and form)

          PUBLISH_ORDER=(
            packages/duskmoon_adaptive_scaffold
            packages/duskmoon_code_engine
            packages/duskmoon_theme
            packages/duskmoon_theme_bloc
            packages/duskmoon_widgets
            packages/duskmoon_settings
            packages/duskmoon_feedback
            packages/duskmoon_form
            packages/duskmoon_ui
          )

          for pkg in "${PUBLISH_ORDER[@]}"; do
            echo "::group::Publishing $pkg"
            (cd "$pkg" && dart pub publish --force) || echo "::warning::$pkg publish failed (may already exist)"
            echo "::endgroup::"
            # Wait between publishes to avoid pub.dev rate limits
            echo "Waiting 30s before next publish..."
            sleep 30
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes || echo "::warning::Release already exists"
