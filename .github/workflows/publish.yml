name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.1)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: |
          # Build dependency-ordered publish list from all packages/ subdirectories.
          # Tiers are resolved by counting internal deps (packages whose name
          # appears in another package's pubspec.yaml dependencies block).
          #
          # Tier 0 — no internal deps (e.g. adaptive_scaffold, code_engine, theme)
          # Tier 1 — depends only on tier-0 (e.g. theme_bloc, widgets, settings, feedback, visualization)
          # Tier 2 — depends on tier-0 + tier-1 (e.g. form)
          # Tier 3 — umbrella (e.g. ui)
          #
          # Within each tier packages are sorted alphabetically.

          ALL_PKGS=()
          for d in packages/*/; do
            [ -f "$d/pubspec.yaml" ] && ALL_PKGS+=("${d%/}")
          done

          # Collect package names for internal-dep detection
          PKG_NAMES=()
          for pkg in "${ALL_PKGS[@]}"; do
            PKG_NAMES+=("$(basename "$pkg")")
          done

          # Assign tier to each package based on how many internal deps it has
          declare -A TIER
          for pkg in "${ALL_PKGS[@]}"; do
            name=$(basename "$pkg")
            count=0
            for dep in "${PKG_NAMES[@]}"; do
              [ "$dep" = "$name" ] && continue
              if grep -q "  $dep:" "$pkg/pubspec.yaml" 2>/dev/null; then
                count=$((count + 1))
              fi
            done
            TIER[$pkg]=$count
          done

          # Sort: by tier (ascending), then alphabetically within tier
          PUBLISH_ORDER=($(
            for pkg in "${ALL_PKGS[@]}"; do
              echo "${TIER[$pkg]} $pkg"
            done | sort -k1,1n -k2,2 | awk '{print $2}'
          ))

          echo "Publish order:"
          for pkg in "${PUBLISH_ORDER[@]}"; do
            echo "  [tier ${TIER[$pkg]}] $pkg"
          done

          for pkg in "${PUBLISH_ORDER[@]}"; do
            echo "::group::Publishing $pkg"
            PKG_NAME=$(basename "$pkg")
            PKG_VER=$(grep '^version:' "$pkg/pubspec.yaml" | awk '{print $2}')
            # Skip if this exact version is already published on pub.dev
            if curl -s -o /dev/null -w '%{http_code}' "https://pub.dev/api/packages/$PKG_NAME/versions/$PKG_VER" | grep -q '^200$'; then
              echo "::notice::$PKG_NAME $PKG_VER already published — skipping"
            else
              (cd "$pkg" && dart pub publish --force) || echo "::warning::$pkg publish failed"
              # Wait between publishes to avoid pub.dev rate limits
              echo "Waiting 30s before next publish..."
              sleep 30
            fi
            echo "::endgroup::"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes || echo "::warning::Release already exists"
