name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: |
          # Publish order respects dependency graph:
          # 1. duskmoon_theme (no deps)
          # 2. duskmoon_widgets, duskmoon_settings, duskmoon_feedback (depend on theme)
          # 3. duskmoon_ui (depends on all above)
          # Note: duskmoon_theme_bloc is publish_to: none — skipped

          PUBLISH_ORDER=(
            packages/duskmoon_theme
            packages/duskmoon_widgets
            packages/duskmoon_settings
            packages/duskmoon_feedback
            packages/duskmoon_ui
          )

          for pkg in "${PUBLISH_ORDER[@]}"; do
            echo "::group::Publishing $pkg"
            (cd "$pkg" && dart pub publish --force) || echo "::warning::$pkg publish failed (may already exist)"
            echo "::endgroup::"
            # Wait between publishes to avoid pub.dev rate limits
            echo "Waiting 60s before next publish..."
            sleep 60
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
