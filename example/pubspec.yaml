name: example
description: DuskMoon UI showcase app
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  duskmoon_ui:
    path: ../packages/duskmoon_ui
  duskmoon_widgets:
    path: ../packages/duskmoon_widgets
  duskmoon_adaptive_scaffold:
    path: ../packages/duskmoon_adaptive_scaffold
  duskmoon_visualization:
    path: ../packages/duskmoon_visualization
  duskmoon_code_engine:
    path: ../packages/duskmoon_code_engine
  duskmoon_theme_bloc:
    path: ../packages/duskmoon_theme_bloc
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  go_router: ^14.8.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansMath
      fonts:
        - asset: fonts/NotoSansMath-Regular.ttf
    - family: NotoSansSymbols2
      fonts:
        - asset: fonts/NotoSansSymbols2-Regular.ttf
